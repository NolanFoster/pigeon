name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install worker-build
        run: |
          # Pinned: 0.8.2 was yanked; 0.8.3 requires wasm-bindgen >= 0.2.121
          # which conflicts with the worker 0.8 / js-sys 0.3.95 versions
          # pinned in Cargo.lock.
          if ! command -v worker-build >/dev/null 2>&1 || \
             [ "$(worker-build --version 2>/dev/null | awk '{print $2}')" != "0.8.1" ]; then
            cargo install worker-build --version 0.8.1 --locked --force
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
