<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pigeon</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/theme/toastui-editor-dark.min.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Pigeon</h1>
      <p class="subtitle">Push notifications, simple as HTTP</p>
    </header>

    <section class="subscribe-form">
      <div class="input-group">
        <input type="text" id="topic-input" placeholder="Topic name" autocomplete="off">
        <button id="subscribe-btn">Subscribe</button>
      </div>
    </section>

    <section id="topics-section" class="topics" hidden>
      <div class="topics-header">
        <h2>Subscribed Topics</h2>
        <button id="enable-push-btn" class="push-btn">Enable Push Notifications</button>
      </div>
      <div id="topic-tabs" class="topic-tabs"></div>
    </section>

    <section id="messages-section" class="messages" hidden>
      <div class="messages-header">
        <button id="clear-messages-btn" class="clear-btn">Clear</button>
      </div>
      <div id="messages-list" class="messages-list"></div>
      <div class="compose">
        <input type="text" id="compose-title" placeholder="Title (optional)" autocomplete="off">
        <div class="compose-editor">
          <div id="compose-editor-container"></div>
        </div>
        <div class="compose-options" style="margin-top: 0.5rem; display: flex; align-items: center; justify-content: space-between; font-size: 0.9rem;">
          <div style="display: flex; align-items: center; gap: 0.5rem;">
            <label for="compose-priority" style="color: var(--color-text-secondary); font-weight: 500;">Priority:</label>
            <select id="compose-priority" style="padding: 0.25rem 0.5rem; border-radius: var(--radius-sm); border: 1px solid var(--color-border); background: var(--color-surface); color: var(--color-text); outline: none;">
              <option value="5">P5 - Critical</option>
              <option value="4">P4 - High</option>
              <option value="3" selected>P3 - Normal</option>
              <option value="2">P2 - Low</option>
              <option value="1">P1 - Info</option>
            </select>
          </div>
          <button id="send-btn">Send</button>
        </div>
      </div>
    </section>

    <section class="usage">
      <h2>Send a message</h2>
      <pre><code>curl -d "Hello!" https://your-worker.dev/mytopic</code></pre>
      <p>With title and priority:</p>
      <pre><code>curl -H "X-Title: Alert" -H "X-Priority: 5" \
     -d "Server is down!" https://your-worker.dev/mytopic</code></pre>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
