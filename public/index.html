<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pigeon</title>
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#faf8f5">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#12100d">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/toastui-editor.min.css" />
  <link rel="stylesheet" href="https://uicdn.toast.com/editor/latest/theme/toastui-editor-dark.min.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1><img src="/logo.png" alt="Pigeon Logo" class="logo"> Pigeon</h1>
      <p class="subtitle">Push notifications, simple as HTTP</p>
    </header>

    <section class="subscribe-form">
      <div class="input-group">
        <input type="text" id="topic-input" placeholder="Topic name" autocomplete="off">
        <button id="subscribe-btn" class="btn btn-primary">Subscribe</button>
      </div>
    </section>

    <section id="topics-section" class="topics" hidden>
      <div class="topics-header">
        <h2>Subscribed Topics</h2>
        <button id="enable-push-btn" class="btn btn-secondary push-btn">Enable Push Notifications</button>
      </div>
      <div id="topic-tabs" class="topic-tabs"></div>
    </section>

    <section id="messages-section" class="messages" hidden>
      <div class="messages-header">
        <button id="clear-messages-btn" class="btn btn-tertiary clear-btn">Clear</button>
      </div>
      <div id="messages-list" class="messages-list"></div>
      <div class="compose">
        <div class="compose-meta">
          <input type="text" id="compose-title" class="compose-title-input" placeholder="Title (optional)" autocomplete="off">
          <select id="compose-priority" class="compose-priority-select" aria-label="Message priority">
            <option value="5">P5 · Critical</option>
            <option value="4">P4 · High</option>
            <option value="3" selected>P3 · Normal</option>
            <option value="2">P2 · Low</option>
            <option value="1">P1 · Info</option>
          </select>
        </div>
        <div class="compose-tags-field">
          <span class="compose-tags-prefix" aria-hidden="true">#</span>
          <input type="text" id="compose-tags" class="compose-tags-input" placeholder="tags, comma separated" autocomplete="off">
        </div>
        <div class="compose-editor">
          <div id="compose-editor-container"></div>
        </div>
        <div class="compose-actions">
          <button id="send-btn" class="btn btn-primary">Send</button>
        </div>
      </div>
    </section>

    <section class="usage">
      <h2>Send a message</h2>
      <div class="code-wrapper"><button class="code-copy-btn" onclick="copyCode(this)">Copy</button><pre><code>curl -d "Hello!" https://your-worker.dev/mytopic</code></pre></div>
      <p>With title and priority:</p>
      <div class="code-wrapper"><button class="code-copy-btn" onclick="copyCode(this)">Copy</button><pre><code>curl -H "X-Title: Alert" -H "X-Priority: 5" \
     -d "Server is down!" https://your-worker.dev/mytopic</code></pre></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://uicdn.toast.com/editor/latest/toastui-editor-all.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
